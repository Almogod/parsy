apiVersion: apps/v1
kind: Deployment
metadata:
  name: parsy-api
  labels:
    app: parsy
    tier: api
spec:
  replicas: 3                         # Horizontal scale
  selector:
    matchLabels:
      app: parsy
      tier: api
  template:
    metadata:
      labels:
        app: parsy
        tier: api
    spec:
      containers:
        - name: parsy-api
          image: parsy:2.0.0
          ports:
            - containerPort: 8000
          env:
            - name: MAX_CONCURRENT_JOBS
              value: "8"
            - name: FAST_WORKERS
              value: "4"
            - name: OCR_WORKERS
              value: "4"
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: parsy-secrets
                  key: redis-url
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"            # 2 vCPU max per pod
              memory: "2Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 30
          lifecycle:
            preStop:
              exec:
                command: ["sleep", "5"]   # Drain in-flight SSE streams
      terminationGracePeriodSeconds: 60

---
apiVersion: v1
kind: Service
metadata:
  name: parsy-api-svc
spec:
  selector:
    app: parsy
    tier: api
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: parsy-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: parsy-api
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
